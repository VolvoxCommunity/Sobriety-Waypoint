# Login Flow
# Verifies existing user can log in and reach dashboard
appId: com.volvox.sobrietywaypoint

---
- launchApp:
    clearState: true

# Wait for login screen to load
- assertVisible: "Sobriety Waypoint"
- assertVisible: "Your journey to recovery"

# Enter email - tap below "Email" label
- tapOn:
    text: "Email"
    index: 0
- tapOn:
    below: "Email"
- inputText: ${E2E_EMAIL}

# Enter password - tap below "Password" label
- tapOn:
    below: "Password"
- inputText: ${E2E_PASSWORD}

# Submit login
- tapOn: "Sign In"

# Wait for dashboard to load (shows greeting with user's name)
- extendedWaitUntil:
    visible: "Hello,"
    timeout: 15000

# Verify dashboard elements
- assertVisible: "Days Sober"
- assertVisible: "Your Sobriety Journey"
